<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Maaltjes</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Maaltjes" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="./assets/icons/icon-192.png" />
  <link rel="shortcut icon" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell" aria-label="Maaltjes app">
    <header class="app-header">
      <img src="./icon.png" onerror="this.onerror=null;this.src='./assets/icons/icon-192.png';" alt="" class="app-icon" />
      <h1>Maaltjes</h1>
    </header>

    <section class="meal-grid" id="mealGrid" aria-live="polite"></section>

    <button class="add-button" id="addOpen" type="button" aria-label="Foto toevoegen">+</button>
  </main>

  <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>

  <section class="upload-sheet" id="uploadSheet" aria-modal="true" role="dialog" hidden>
    <button class="close-sheet" id="addClose" type="button" aria-label="Sluiten">×</button>
    <form id="mealForm" class="meal-form">
      <input id="nameInput" name="title" type="text" placeholder="Naam" autocomplete="off" required />

      <div class="upload-card" id="uploadCard">
        <input id="fileInput" name="file" type="file" accept="image/*" required />
        <div class="upload-empty" id="uploadEmpty">+</div>
        <img id="photoPreview" alt="" hidden />
      </div>

      <textarea id="recipeInput" name="thought" placeholder="Recept"></textarea>
      <button class="primary-button" id="submitButton" type="submit">Opslaan</button>
      <p class="small-status" id="formStatus" aria-live="polite"></p>
    </form>
  </section>

  <section class="info-layer" id="infoLayer" hidden>
    <article class="info-card" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
      <div class="info-actions-top">
        <button class="delete-info" id="infoDelete" type="button">Verwijderen</button>
        <button class="close-info" id="infoClose" type="button" aria-label="Sluiten">×</button>
      </div>

      <div class="recipe-view" id="recipeView">
        <h2 id="infoTitle"></h2>
        <p id="infoText"></p>
        <div class="info-actions-bottom">
          <button class="edit-info" id="infoEdit" type="button">Bewerken</button>
        </div>
      </div>

      <form class="recipe-edit" id="recipeEditForm" hidden>
        <label for="editTitleInput">Naam</label>
        <input id="editTitleInput" name="editTitle" type="text" autocomplete="off" required />

        <label for="editRecipeInput">Recept</label>
        <textarea id="editRecipeInput" name="editRecipe"></textarea>

        <p class="small-status" id="editStatus" aria-live="polite"></p>
        <div class="edit-buttons">
          <button class="secondary-button" id="editCancel" type="button">Annuleren</button>
          <button class="primary-button compact" id="editSave" type="submit">Opslaan</button>
        </div>
      </form>
    </article>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
