<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Meals Memories</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="phone-shell" aria-label="Meals memories app">
    <header class="topbar">
      <button class="icon-button" type="button" aria-label="Terug">‹</button>
      <h1>Meals</h1>
      <button class="menu-button" type="button" aria-label="Menu">⋮</button>
    </header>

    <section class="collection-header" aria-label="Collectie overzicht">
      <div class="cover-tile" id="coverTile" aria-hidden="true">
        <span>🍝</span>
      </div>
      <div class="collection-info">
        <strong id="memoryCount">0</strong>
        <span>Memories</span>
        <div class="people-row" aria-label="Deelnemers">
          <div class="avatar">E</div>
          <button class="person-add" type="button" aria-label="Persoon toevoegen">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 12a4 4 0 1 0-3.99-4A4 4 0 0 0 15 12Zm0 2c-2.67 0-8 1.34-8 4v1.5h9.25a6.7 6.7 0 0 1-.25-1.8A6.55 6.55 0 0 1 17.2 14.2 14.4 14.4 0 0 0 15 14Zm5 1v3h3v2h-3v3h-2v-3h-3v-2h3v-3Z"/></svg>
          </button>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="Filters">
      <button class="square-control" id="searchToggle" type="button" aria-label="Zoeken">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.8 17.2a7.4 7.4 0 1 1 5.24-2.16l4.46 4.46-1.4 1.4-4.46-4.46a7.37 7.37 0 0 1-3.84 1.06Zm0-2a5.4 5.4 0 1 0 0-10.8 5.4 5.4 0 0 0 0 10.8Z"/></svg>
      </button>
      <button class="square-control" id="filterButton" type="button" aria-label="Filteren">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h10.2a2.3 2.3 0 0 0 4.6 0H20V5h-1.2a2.3 2.3 0 0 0-4.6 0H4Zm0 12h1.2a2.3 2.3 0 0 0 4.6 0H20v-2H9.8a2.3 2.3 0 0 0-4.6 0H4Zm0-6h6.2a2.3 2.3 0 0 0 4.6 0H20v-2h-5.2a2.3 2.3 0 0 0-4.6 0H4Z"/></svg>
      </button>
      <div class="tabs" role="tablist" aria-label="Memory type">
        <button class="tab active" data-filter="all" type="button">All</button>
        <button class="tab" data-filter="photo" type="button">Photos</button>
        <button class="tab" data-filter="video" type="button">Videos</button>
        <button class="tab" data-filter="thought" type="button">Thoughts</button>
      </div>
    </section>

    <section class="search-panel" id="searchPanel" aria-label="Zoeken" hidden>
      <input id="searchInput" type="search" placeholder="Zoek in memories..." autocomplete="off" />
    </section>

    <section class="memory-grid" id="memoryGrid" aria-live="polite"></section>

    <nav class="bottom-nav" aria-label="Hoofdnavigatie">
      <button type="button"><span>▣</span><small>Today</small></button>
      <button type="button"><span>⌂</span><small>All</small></button>
      <button type="button" class="active"><span>●●●</span><small>Coves</small></button>
      <button type="button" id="saveOpen"><span>＋</span><small>Save</small></button>
    </nav>
  </main>

  <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
  <section class="upload-sheet" id="uploadSheet" aria-label="Nieuwe memory" aria-modal="true" role="dialog" hidden>
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-title-row">
      <h2>Nieuwe memory</h2>
      <button class="close-sheet" id="saveClose" type="button" aria-label="Sluiten">×</button>
    </div>

    <form id="memoryForm" class="memory-form">
      <label>
        <span>Titel</span>
        <input id="titleInput" name="title" type="text" placeholder="Bijvoorbeeld: pasta in de tuin" required />
      </label>

      <label>
        <span>Type</span>
        <select id="typeInput" name="type">
          <option value="photo">Photo</option>
          <option value="video">Video</option>
          <option value="thought">Thought</option>
        </select>
      </label>

      <div class="upload-card" id="uploadCard">
        <input id="fileInput" name="file" type="file" accept="image/*" />
        <div class="upload-empty" id="uploadEmpty">
          <strong>＋ Foto toevoegen</strong>
          <span>Tik hier om een afbeelding te kiezen</span>
        </div>
        <img id="photoPreview" alt="Voorbeeld van gekozen foto" hidden />
      </div>

      <label>
        <span>Gedachte / notitie</span>
        <textarea id="thoughtInput" name="thought" placeholder="Optioneel: schrijf kort wat je wil onthouden..."></textarea>
      </label>

      <button class="primary-button" id="submitButton" type="submit">Opslaan</button>
      <p class="small-status" id="formStatus" aria-live="polite"></p>
    </form>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
