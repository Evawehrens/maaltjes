<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Meals Memories</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="phone-shell" aria-label="Meals memories app">
    <section class="app-screen">
      <header class="topbar">
        <button class="icon-button ghost" type="button" aria-label="Terug">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.8 4.8 8.6 12l7.2 7.2"/></svg>
        </button>
        <h1>Meals</h1>
        <button class="icon-button menu-button" type="button" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </header>

      <section class="collection-header" aria-label="Collectie overzicht">
        <div class="cover-card" id="coverCard" role="img" aria-label="Coverfoto van meals"></div>
        <div class="collection-meta">
          <strong id="memoryCount">46</strong>
          <span>Memories</span>
          <div class="avatar-row">
            <div class="avatar">E</div>
            <button class="add-person" type="button" aria-label="Persoon toevoegen">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 19a6 6 0 0 0-12 0"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M16 11h6"/></svg>
            </button>
          </div>
        </div>
      </section>

      <nav class="filter-strip" aria-label="Filters">
        <button class="square-action" id="searchToggle" type="button" aria-label="Zoeken">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>
        </button>
        <button class="square-action" id="filterButton" type="button" aria-label="Filteren">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h10M18 7h2M4 17h3M11 17h9M4 12h2M10 12h10"/><circle cx="16" cy="7" r="2"/><circle cx="9" cy="17" r="2"/><circle cx="8" cy="12" r="2"/></svg>
        </button>
        <div class="tabs" role="tablist" aria-label="Soort herinnering">
          <button class="tab active" data-filter="all" type="button" role="tab" aria-selected="true">All</button>
          <button class="tab" data-filter="photo" type="button" role="tab" aria-selected="false">Photos</button>
          <button class="tab" data-filter="video" type="button" role="tab" aria-selected="false">Videos</button>
          <button class="tab" data-filter="thought" type="button" role="tab" aria-selected="false">Thoughts</button>
        </div>
      </nav>

      <section class="search-panel" id="searchPanel" aria-label="Zoeken in herinneringen" hidden>
        <input id="searchInput" type="search" placeholder="Zoek op titel, gerecht of moment…" autocomplete="off" />
      </section>

      <section class="notice" id="notice" hidden></section>

      <section class="memory-grid" id="memoryGrid" aria-label="Herinneringen"></section>
    </section>

    <nav class="bottom-nav" aria-label="Hoofdnavigatie">
      <button type="button" class="nav-item">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="4" width="14" height="16" rx="3"/><path d="M8 2v4M16 2v4M8 10h8M12 13v5M9.5 15.5h5"/></svg>
        <span>Today</span>
      </button>
      <button type="button" class="nav-item">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20V9a7 7 0 0 1 14 0v11"/><path d="M9 20v-7a3 3 0 0 1 6 0v7"/></svg>
        <span>All</span>
      </button>
      <button type="button" class="nav-item active">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="7" r="3"/><circle cx="7" cy="16" r="3"/><circle cx="17" cy="16" r="3"/></svg>
        <span>Coves</span>
      </button>
      <button type="button" class="nav-item" id="saveButton">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v16M4 12h16"/></svg>
        <span>Save</span>
      </button>
    </nav>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <section class="save-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-handle"></div>
      <header class="modal-header">
        <h2 id="modalTitle">Nieuwe memory</h2>
        <button class="icon-button ghost" type="button" id="closeModal" aria-label="Sluiten">×</button>
      </header>
      <form id="memoryForm" class="memory-form">
        <label>
          Titel
          <input name="title" type="text" placeholder="Bijvoorbeeld: pasta in de tuin" required />
        </label>
        <label>
          Type
          <select name="type">
            <option value="photo">Photo</option>
            <option value="video">Video</option>
            <option value="thought">Thought</option>
          </select>
        </label>
        <label>
          Foto
          <input name="file" type="file" accept="image/*,video/*" />
        </label>
        <label>
          Gedachte / notitie
          <textarea name="thought" rows="3" placeholder="Optioneel: schrijf kort wat je wil onthouden…"></textarea>
        </label>
        <button class="primary-button" type="submit">Opslaan</button>
        <p class="form-hint">Zonder ingerichte Supabase bucket slaat de app dit tijdelijk lokaal in je browser op.</p>
      </form>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="github-upload-placeholder.js"></script>
  <script src="app.js"></script>
</body>
</html>
